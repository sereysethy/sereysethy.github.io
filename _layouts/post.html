<!DOCTYPE HTML>
<html>
  <head>
    <title>{{ page.title }}</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <!-- Latest compiled and minified CSS -->
    <link href='https://fonts.googleapis.com/css?family=Roboto:400,100' rel='stylesheet' type='text/css'>
    <link href='https://fonts.googleapis.com/css?family=Poiret+One' rel='stylesheet' type='text/css'>
    <link href='https://fonts.googleapis.com/css?family=Abel' rel='stylesheet' type='text/css'>
    <link rel="stylesheet" href="{{ site.url }}/assets/bootstrap/3.3.6/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ site.url }}/assets/css/stylesheet.css">
    <link rel="stylesheet" href="{{ site.url }}/assets/css/syntax.css">

    <script src="{{ site.url }}/assets/js/moment/2.11.2/moment.min.js"></script>
  </head>
  <body>
    <nav class="navbar navbar-inverse navbar-fixed-top">
      <div class="container">
        <div class="navbar-header">
          <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#navbar" aria-expanded="false" aria-controls="navbar">
            <span class="sr-only">Toggle navigation</span>
            <span class="icon-bar"></span>
            <span class="icon-bar"></span>
            <span class="icon-bar"></span>
          </button>
          <a class="navbar-brand" href="/">Sereysethy Touch</a>
        </div>
        <div id="navbar" class="collapse navbar-collapse">
          <ul class="nav navbar-nav">
            <li><a href="{{site.url}}/">Home</a></li>
            <!--li><a href="">Commands</a></li-->
            <!--li><a href="{{site.url}}/about">About me</a></li-->
          </ul>
        </div><!--/.nav-collapse -->
      </div>
    </nav>
    
    <div class="container" style="margin-top: 38px;">
        <div class="row">
          <div class="col-lg-8">
            {{ content }}
            
            <div id="tags">
              <span class="label label-default">Tagged:</span>
              {% for tag in page.tags %}
              <a class="tagged" href="{{site.url}}/tag/{{tag | replace: " ", "-" }}.html">{{tag}}</a>&nbsp;
              {% endfor %}
            </div>

            <div id="disqus_thread"></div>
            <script>
            /**
            * RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
            * LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables
            */
            
            var disqus_config = function () {
            this.page.url = '{{ site.url }}'; // Replace PAGE_URL with your page's canonical URL variable
            this.page.identifier = '{{ page.url }}'; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
            };
            
            (function() { // DON'T EDIT BELOW THIS LINE
            var d = document, s = d.createElement('script');

            s.src = '//sereysethy.disqus.com/embed.js';

            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript" rel="nofollow">comments powered by Disqus.</a></noscript>

            
          </div>
          <div class="col-lg-4">
            <a class="twitter-timeline" href="https://twitter.com/sereysethy">Tweets by sereysethy</a> <script async src="//platform.twitter.com/widgets.js" charset="utf-8"></script>
          </div>
        </div>
    </div><!-- /.container -->
  <script src="{{ site.url }}/assets/js/jquery/2.2.1/jquery.min.js"></script>
  <script src="{{ site.url }}/assets/bootstrap/3.3.6/js/bootstrap.min.js"></script>
  <script src="{{ site.url }}/assets/js/app.js"></script>
  <script>
    (function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
    (i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
    m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
    })(window,document,'script','//www.google-analytics.com/analytics.js','ga');

    ga('create', 'UA-75161594-1', 'auto');
    ga('send', 'pageview');

  </script>
  </body>
</html>
